<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Resume Tailor</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="panel">
      <h1>Resume Tailor</h1>
      <p class="subtitle">Upload your resume, get a fit score for the active LinkedIn role, and tailor it step by step.</p>

      <div class="controls">
        <label class="file-label" for="resumeFile">Upload resume (.txt, .md, .pdf)</label>
        <input id="resumeFile" type="file" accept=".txt,.md,.pdf,text/plain,text/markdown,application/pdf" />
      </div>

      <div class="actions">
        <button id="scoreFitBtn">Score fit</button>
        <button id="rewriteBtn" disabled>Rewrite resume now</button>
      </div>

      <div id="status" data-tone="info">Ready.</div>

      <section id="scoreCard" class="card hidden">
        <h2>Resume fit score</h2>
        <div id="scoreBadge" class="score">0/100</div>
        <p id="scoreSummary"></p>
      </section>

      <section id="planCard" class="card hidden">
        <h2>Step-by-step tailoring plan</h2>
        <ol id="planList"></ol>
      </section>

      <section id="missingCard" class="card hidden">
        <h2>Missing details to provide</h2>
        <ul id="missingList"></ul>
      </section>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
